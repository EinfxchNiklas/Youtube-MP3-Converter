<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT MP3 Converter</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="32" height="32">
        <circle cx="24" cy="24" r="24" fill="#ff3c3c"/>
        <polygon points="19,15 37,24 19,33" fill="#fff"/>
      </svg>
      <span>YT MP3 Converter</span>
    </div>
    <a href="/logout" class="btn btn-ghost btn-sm">Abmelden</a>
  </header>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main class="app-main">

    <!-- Step 1: URL -->
    <section class="card" id="card-url">
      <h2 class="card-title">
        <span class="step-badge">1</span>
        YouTube-URL eingeben
      </h2>
      <div class="input-row">
        <input
          type="url"
          id="yt-url"
          placeholder="https://www.youtube.com/watch?v=..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn btn-primary" id="btn-load">
          <span class="btn-text">Video laden</span>
          <span class="spinner hidden"></span>
        </button>
      </div>
      <div id="url-error" class="alert alert-error hidden"></div>
    </section>

    <!-- Step 2: Audio Editor (hidden until loaded) -->
    <section class="card hidden" id="card-settings">
      <h2 class="card-title">
        <span class="step-badge">2</span>
        Audio bearbeiten
      </h2>

      <!-- Video preview -->
      <div class="video-info" id="video-info">
        <img id="vi-thumb" src="" alt="Thumbnail" class="vi-thumb" />
        <div class="vi-meta">
          <div class="vi-title" id="vi-title"></div>
          <div class="vi-duration" id="vi-duration"></div>
        </div>
      </div>

      <!-- Hidden audio element -->
      <audio id="audio-el" preload="auto"></audio>

      <!-- Loading state -->
      <div class="player-loading" id="player-loading">
        <span class="spinner"></span>
        <span>Audio wird heruntergeladen&#8230;</span>
      </div>

      <!-- Player (hidden until ready) -->
      <div class="player-card hidden" id="player-card">
        <div class="progress-row">
          <span class="time-display" id="time-current">00:00.000</span>
          <input type="range" class="progress-slider" id="progress-slider"
                 min="0" max="1000000" value="0" step="1" />
          <span class="time-display" id="time-total">00:00.000</span>
        </div>
        <div class="player-controls">
          <button class="btn btn-ghost btn-sm" id="btn-seek-back10" title="10 Sekunden zurueck">&laquo; 10s</button>
          <button class="btn btn-ghost btn-sm" id="btn-seek-back1"  title="1 Sekunde zurueck">&laquo; 1s</button>
          <button class="btn btn-primary btn-play-lg" id="btn-play"><span id="play-icon">&#9654;</span></button>
          <button class="btn btn-ghost btn-sm" id="btn-seek-fwd1"   title="1 Sekunde vor">1s &raquo;</button>
          <button class="btn btn-ghost btn-sm" id="btn-seek-fwd10"  title="10 Sekunden vor">10s &raquo;</button>
          <div class="volume-row">
            <span class="volume-icon">&#128266;</span>
            <input type="range" class="volume-slider" id="volume-slider"
                   min="0" max="1" step="0.01" value="1" />
          </div>
        </div>
      </div>

      <!-- Cut editor (hidden until ready) -->
      <div class="cut-editor hidden" id="cut-editor">
        <div class="cut-section-title">Gesamt-Bereich</div>
        <div class="time-row">
          <div class="form-group">
            <label>Start <span class="label-hint">(mm:ss.mmm)</span></label>
            <input type="text" class="time-input" id="overall-start" placeholder="00:00.000" />
          </div>
          <div class="form-group">
            <label>Ende <span class="label-hint">(mm:ss.mmm)</span></label>
            <input type="text" class="time-input" id="overall-end" placeholder="00:00.000" />
          </div>
        </div>
        <div class="cut-section-title cut-section-title--secondary">
          Ausschnitte rausschneiden
          <span class="label-hint">(optional &ndash; werden entfernt)</span>
        </div>
        <div id="cut-list"></div>
        <button class="btn btn-ghost btn-sm" id="btn-add-cut">+ Ausschnitt</button>
      </div>

      <!-- Filename -->
      <div class="form-group filename-group">
        <label for="filename">Dateiname <span class="label-hint">(.mp3 wird automatisch erg&#228;nzt)</span></label>
        <input type="text" id="filename" placeholder="mein-audio" maxlength="120" />
      </div>

      <div id="settings-error" class="alert alert-error hidden"></div>

      <button class="btn btn-accent btn-full" id="btn-download" disabled>
        <span class="btn-text">MP3 herunterladen</span>
        <span class="spinner hidden"></span>
      </button>
    </section>

    <!-- Progress / status -->
    <div class="status-bar hidden" id="status-bar">
      <div class="status-icon">
        <span class="spinner"></span>
      </div>
      <div class="status-msg" id="status-msg">Konvertiere…</div>
    </div>

  </main>

  <script type="module" src="/static/app.js?v=5"></script>
</body>
</html>
